  // pushes the Bridge tabs off-screen. Safari Regular and Chrome
  // Incognito have no stored scrollTop so they paint correctly.
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  window.addEventListener('load', () => { window.scrollTo(0, 0); });
</script>
