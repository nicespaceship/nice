name: NICE CI

on:
  push:
    branches: [main, claude/*, post-launch-*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Stamp SW cache version
        run: |
          # Auto-increment SW cache version based on git short SHA
          SHA=$(git rev-parse --short HEAD)
          STAMP=$(date +%s)
          sed -i "s/const CACHE_VERSION = [0-9]*/const CACHE_VERSION = ${STAMP}/" app/sw.js
          echo "SW cache version stamped: ${STAMP} (${SHA})"

      - name: Stamp app/index.html script+css version params
        run: |
          # The ?v= query params on <script> and <link> tags are the browser's
          # HTTP cache key. Without bumping them per-deploy, users with a
          # cached copy of blueprint-store.js?v=40 never re-fetch — even after
          # the service worker updates. Stamping them forces a fresh download.
          STAMP=$(date +%s)
          sed -i -E "s/\?v=[a-zA-Z0-9_.-]+/?v=${STAMP}/g" app/index.html
          COUNT=$(grep -c "?v=${STAMP}" app/index.html || echo 0)
          echo "Stamped ${COUNT} asset version params → ?v=${STAMP}"

      - name: Verify build
        run: npm run build

      - name: Run unit tests with coverage
        run: npx vitest run --reporter=verbose --coverage

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Check bundle size
        run: |
          SIZE=$(cat app/js/nice.js app/js/lib/*.js app/js/views/*.js | wc -c)
          echo "Total JS size: $SIZE bytes"
          if [ "$SIZE" -gt 204800 ]; then
            echo "::warning::Bundle size exceeds 200KB budget ($SIZE bytes)"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: node server.js &
        env:
          PORT: 3000

      - name: Wait for server
        run: npx wait-on http://localhost:3000/app/ --timeout 10000

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/app/
          uploadArtifacts: true
          budgetPath: .github/lighthouse-budget.json
        continue-on-error: true

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Stamp SW cache version
        run: |
          STAMP=$(date +%s)
          sed -i "s/const CACHE_VERSION = [0-9]*/const CACHE_VERSION = ${STAMP}/" app/sw.js

      - name: Stamp app/index.html script+css version params
        run: |
          # The ?v= query params on <script> and <link> tags are the browser's
          # HTTP cache key. Without bumping them per-deploy, users with a
          # cached copy of blueprint-store.js?v=40 never re-fetch — even after
          # the service worker updates. Stamping them forces a fresh download.
          STAMP=$(date +%s)
          sed -i -E "s/\?v=[a-zA-Z0-9_.-]+/?v=${STAMP}/g" app/index.html
          COUNT=$(grep -c "?v=${STAMP}" app/index.html || echo 0)
          echo "Stamped ${COUNT} asset version params → ?v=${STAMP}"

      - name: Generate root index from app
        run: cp app/index.html index.html

      - name: Deploy nicespaceship.ai (app)
        # Pass the commit subject explicitly. Wrangler's default reads the
        # full commit body and forwards it to Cloudflare's deployments API,
        # which rejected #300 with "Invalid commit message, it must be a
        # valid UTF-8 string. [code: 8000111]" despite the body being valid
        # UTF-8 — likely a bug in their parser around bodies with multiple
        # em-dashes. Subject lines stay short + ASCII and surface as the
        # deploy's label in the Cloudflare dashboard.
        run: |
          MSG=$(git log -1 --format=%s)
          npx wrangler pages deploy . --project-name nicespaceship-ai --branch main --commit-dirty=true --commit-message="$MSG"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy nicespaceship.com (website)
        run: |
          MSG=$(git log -1 --format=%s)
          npx wrangler pages deploy www/ --project-name nicespaceship-com --branch main --commit-message="$MSG"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
