name: NICE CI

on:
  push:
    branches: [main, claude/*, post-launch-*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Stamp SW cache version
        run: |
          # Auto-increment SW cache version based on git short SHA
          SHA=$(git rev-parse --short HEAD)
          STAMP=$(date +%s)
          sed -i "s/const CACHE_VERSION = [0-9]*/const CACHE_VERSION = ${STAMP}/" app/sw.js
          echo "SW cache version stamped: ${STAMP} (${SHA})"

      - name: Verify build
        run: npm run build

      - name: Run unit tests with coverage
        run: npx vitest run --reporter=verbose --coverage

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Check bundle size
        run: |
          SIZE=$(cat app/js/nice.js app/js/lib/*.js app/js/views/*.js | wc -c)
          echo "Total JS size: $SIZE bytes"
          if [ "$SIZE" -gt 204800 ]; then
            echo "::warning::Bundle size exceeds 200KB budget ($SIZE bytes)"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: node server.js &
        env:
          PORT: 3000

      - name: Wait for server
        run: npx wait-on http://localhost:3000/app/ --timeout 10000

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/app/
          uploadArtifacts: true
          budgetPath: .github/lighthouse-budget.json
        continue-on-error: true

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Stamp SW cache version
        run: |
          STAMP=$(date +%s)
          sed -i "s/const CACHE_VERSION = [0-9]*/const CACHE_VERSION = ${STAMP}/" app/sw.js

      - name: Generate root index from app
        run: cp app/index.html index.html

      - name: Deploy nicespaceship.ai (app)
        run: npx wrangler pages deploy . --project-name nicespaceship-ai --branch main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy nicespaceship.com (website)
        run: npx wrangler pages deploy www/ --project-name nicespaceship-com --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
