name: MCP smoke

# Layer 2 health check: runs the per-umbrella tier-2 smoke (discover +
# drift) and any tier-3 introspective tool calls configured in
# tools/mcp-smoke/providers/*.json against every MCP this user has
# connected. Fails the workflow if any umbrella errors or any tier-3
# call returns an error.
#
# Requires repo secrets SUPABASE_USER_EMAIL + SUPABASE_USER_PASSWORD —
# see tools/mcp-smoke/README.md for setup.

on:
  schedule:
    - cron: '0 6 * * *'  # nightly 06:00 UTC
  workflow_dispatch:
    inputs:
      args:
        description: 'Args for run.mjs (e.g. "--all", "--inspect hubspot", "linear")'
        required: false
        default: '--all'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Run MCP smoke
        env:
          SUPABASE_USER_EMAIL: ${{ secrets.SUPABASE_USER_EMAIL }}
          SUPABASE_USER_PASSWORD: ${{ secrets.SUPABASE_USER_PASSWORD }}
          RUN_ARGS: ${{ github.event.inputs.args || '--all' }}
        run: node tools/mcp-smoke/run.mjs $RUN_ARGS
