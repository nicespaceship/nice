<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blueprints — NICE SPACESHIP</title>
  <meta name="description" content="Browse 800+ AI agent and spaceship blueprints. Agents for marketing, sales, analytics, engineering, and every industry." />
  <meta property="og:title" content="Blueprint Catalog — NICE SPACESHIP" />
  <meta property="og:description" content="800+ pre-built AI agent blueprints. Find one for your business and deploy in minutes." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://nicespaceship.com/blueprints" />
  <meta property="og:image" content="https://nicespaceship.ai/assets/og-image.svg" />
  <meta property="og:site_name" content="NICE SPACESHIP" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Blueprint Catalog — NICE SPACESHIP" />
  <meta name="twitter:description" content="800+ pre-built AI agent blueprints. Deploy a team for your business in minutes." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://nicespaceship.com/blueprints" />
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="/css/site.css" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "NICE SPACESHIP Blueprint Catalog",
    "description": "Browse 800+ AI agent blueprints for every type of business.",
    "url": "https://nicespaceship.com/blueprints",
    "isPartOf": { "@type": "WebSite", "name": "NICE SPACESHIP", "url": "https://nicespaceship.com" },
    "provider": { "@type": "Organization", "name": "NICE SPACESHIP", "url": "https://nicespaceship.com" }
  }
  </script>
  <style>
    .bp-hero { padding: 40px 0 0; border-top: none; }
    .bp-hero h1 { margin-bottom: 24px; text-transform: none; }
    .bp-toolbar { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
    .bp-tabs { display: flex; gap: 8px; }
    .bp-tab {
      padding: 6px 16px; border: 1px solid var(--border); border-radius: var(--radius);
      background: transparent; color: var(--text-muted); font-size: 0.78rem; font-weight: 500;
      cursor: pointer; font-family: var(--font); transition: all 0.15s;
    }
    .bp-tab:hover { border-color: var(--border-hi); color: var(--text); }
    .bp-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .bp-filters-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .bp-rarity-filters { display: flex; gap: 8px; margin-left: auto; }
    .bp-rarity-btn {
      padding: 4px 10px; border: 1px solid var(--border); border-radius: var(--radius);
      background: transparent; font-size: 0.68rem; font-weight: 600; cursor: pointer;
      font-family: var(--font); transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .bp-rarity-btn:hover { border-color: var(--border-hi); }
    .bp-rarity-btn.active { background: rgba(165,180,252,0.08); border-color: var(--accent2); color: var(--accent2); }
    .bp-rarity-btn[data-rarity="common"] { color: var(--text-muted); }
    .bp-rarity-btn[data-rarity="rare"] { color: #60a5fa; }
    .bp-rarity-btn[data-rarity="epic"] { color: #a78bfa; }
    .bp-rarity-btn[data-rarity="legendary"] { color: #fbbf24; }
    .bp-rarity-btn[data-rarity="mythic"] { color: #f87171; }
    .bp-count { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 12px; }
    .catalog-load-more-wrap { text-align: center; margin-top: 24px; }

    /* ── Side Drawer ── */
    .bp-drawer-overlay {
      position: fixed; inset: 0; z-index: 249;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(2px);
      opacity: 0; pointer-events: none; transition: opacity .3s ease;
    }
    .bp-drawer-overlay.open { opacity: 1; pointer-events: auto; }

    .bp-drawer {
      position: fixed; right: 0; top: 0; bottom: 0; width: 420px; z-index: 250;
      background: var(--surface-2, #18181b); border-left: 1px solid var(--border);
      box-shadow: -4px 0 24px rgba(0,0,0,0.3);
      transform: translateX(100%); transition: transform .3s ease;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .bp-drawer.open { transform: translateX(0); }

    .bp-drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .bp-drawer-title { font-size: 0.82rem; font-weight: 600; color: var(--text); }
    .bp-drawer-nav { display: flex; gap: 4px; }
    .bp-drawer-nav-btn {
      background: none; border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text-muted); width: 28px; height: 28px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 0.72rem;
      font-family: var(--font); transition: all 0.15s;
    }
    .bp-drawer-nav-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .bp-drawer-close {
      background: none; border: none; color: var(--text-muted); font-size: 1.2rem;
      cursor: pointer; padding: 4px 8px; font-family: var(--font); margin-left: 8px;
    }
    .bp-drawer-close:hover { color: var(--text); }

    .bp-drawer-body {
      flex: 1; overflow-y: auto; padding: 24px 20px;
      display: flex; flex-direction: column; gap: 20px;
    }

    /* TCG Card in drawer */
    .tcg-card {
      position: relative; display: flex; flex-direction: column;
      border: 12px solid var(--border, #333); border-radius: 20px;
      background: var(--bg, #09090b); overflow: hidden;
      aspect-ratio: 5/7; max-width: 280px; margin: 0 auto;
    }
    .tcg-name-bar {
      padding: 8px 12px; display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border, #333);
    }
    .tcg-name {
      font-family: var(--font); font-size: 0.95rem; font-weight: 700;
      color: var(--text, #fafafa); letter-spacing: 0.04em; line-height: 1.2;
    }
    .tcg-subtitle {
      margin-left: auto; font-family: var(--font); font-size: 0.5rem;
      color: var(--text-muted, #888); text-transform: uppercase; letter-spacing: 0.08em;
    }
    .tcg-art {
      flex: 1 1 40%; min-height: 0; background: var(--bg, #09090b);
      border-bottom: 1px solid var(--border, #333); overflow: hidden;
      display: flex; align-items: center; justify-content: center; position: relative;
    }
    .tcg-art-role, .tcg-art-class, .tcg-art-serial {
      position: absolute; z-index: 6;
    }
    .tcg-art-role { top: 4px; left: 4px; }
    .tcg-art-class { top: 4px; right: 8px; }
    .tcg-art-serial { bottom: 4px; left: 4px; }
    .tcg-serial-code {
      font-family: var(--font); font-size: 0.42rem; letter-spacing: 0.12em;
      color: var(--text-muted, #888); background: rgba(0,0,0,0.55);
      padding: 1px 5px; border-radius: 2px; backdrop-filter: blur(4px);
    }
    .tcg-serial-code.rarity-badge {
      border: 1px solid; padding: 1px 6px;
    }
    .tcg-marquee {
      overflow: hidden; white-space: nowrap; background: #0a0e14;
      border-top: 1px solid rgba(59,130,246,0.15);
      border-bottom: 1px solid rgba(59,130,246,0.15); padding: 3px 0;
    }
    .tcg-marquee-track {
      display: inline-flex; animation: tcg-scroll 18s linear infinite;
    }
    @keyframes tcg-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .tcg-marquee-track span {
      font-family: var(--font); font-size: 0.48rem; letter-spacing: 0.08em;
      color: #3b82f6; padding: 0 24px;
    }
    .tcg-text-box {
      flex: 1 1 0; padding: 8px 10px; display: flex; flex-direction: column;
      gap: 4px; overflow-y: auto; min-height: 60px;
    }
    .tcg-flavor {
      font-size: 0.6rem; font-style: italic; color: var(--text-muted, #888);
      border-left: 2px solid var(--accent2, #a5b4fc); padding-left: 6px;
      margin: 0 0 2px; line-height: 1.4;
    }
    .tcg-stats {
      padding: 5px 8px; display: grid;
      grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
      border-top: 1px solid var(--border, #333);
      background: rgba(255,255,255,0.03); margin-top: auto;
    }
    .tcg-stat { text-align: center; }
    .tcg-stat-val {
      font-family: var(--font); font-size: 0.65rem; font-weight: 700;
      color: var(--accent2, #a5b4fc); display: block; line-height: 1.3;
    }
    .tcg-stat-lbl {
      font-family: var(--font); font-size: 0.38rem;
      color: var(--text-muted, #888); letter-spacing: 0.08em;
    }
    /* Slot diagram SVG in art */
    .tcg-slot-diagram { width: 70%; height: 70%; opacity: 0.6; }

    /* Description below card */
    .bp-drawer-desc {
      font-size: 0.85rem; color: var(--text-muted); line-height: 1.7;
    }

    /* Actions */
    .bp-drawer-actions { display: flex; gap: 10px; margin-top: auto; padding-top: 8px; }
    .bp-drawer-actions .btn-primary,
    .bp-drawer-actions .btn-secondary { flex: 1; text-align: center; justify-content: center; }

    @media (max-width: 768px) {
      .bp-filters-row { flex-direction: column; align-items: flex-start; }
      .bp-rarity-filters { margin-left: 0; flex-wrap: wrap; }
    }
    @media (max-width: 480px) {
      .bp-tabs { flex-wrap: wrap; }
      .bp-drawer { width: 100%; }
      .bp-drawer-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <header id="site-header"></header>

  <main>
    <section class="section bp-hero">
      <div class="container">
        <h1>Blueprints</h1>
      </div>
    </section>

    <section class="section" style="padding-top:0;border-top:none">
      <div class="container">
        <div class="bp-toolbar">
          <div class="bp-tabs" id="bp-tabs">
            <button class="bp-tab active" data-type="spaceship"><i class="fa-solid fa-rocket"></i> Spaceships</button>
            <button class="bp-tab" data-type="agent"><i class="fa-solid fa-robot"></i> Agents</button>
          </div>
          <input type="text" class="catalog-search" id="bp-search" placeholder="Search by name, category, or description..." />
          <div class="bp-filters-row">
            <div class="catalog-filters" id="bp-cat-filters">
              <button class="catalog-filter active" data-cat="all">All</button>
            </div>
          </div>
          <div class="bp-rarity-filters" id="bp-rarity-filters">
            <button class="bp-rarity-btn active" data-rarity="all">All</button>
            <button class="bp-rarity-btn" data-rarity="common">Common</button>
            <button class="bp-rarity-btn" data-rarity="rare">Rare</button>
            <button class="bp-rarity-btn" data-rarity="epic">Epic</button>
            <button class="bp-rarity-btn" data-rarity="legendary">Legendary</button>
            <button class="bp-rarity-btn" data-rarity="mythic">Mythic</button>
          </div>
        </div>
        <div class="bp-count" id="bp-count"></div>
        <div class="catalog-grid" id="bp-grid">
          <div class="catalog-empty">Loading blueprints...</div>
        </div>
        <div class="catalog-load-more-wrap" id="bp-load-wrap" style="display:none">
          <button class="btn-secondary btn-sm" id="bp-load-btn">Load more</button>
        </div>
      </div>
    </section>
  </main>

  <!-- Side Drawer -->
  <div class="bp-drawer-overlay" id="bp-drawer-overlay"></div>
  <div class="bp-drawer" id="bp-drawer">
    <div class="bp-drawer-header">
      <span class="bp-drawer-title" id="bp-drawer-title"></span>
      <div style="display:flex;align-items:center">
        <div class="bp-drawer-nav">
          <button class="bp-drawer-nav-btn" id="bp-drawer-prev" aria-label="Previous" title="Previous (←)">&#8249;</button>
          <button class="bp-drawer-nav-btn" id="bp-drawer-next" aria-label="Next" title="Next (→)">&#8250;</button>
        </div>
        <button class="bp-drawer-close" id="bp-drawer-close" aria-label="Close">&times;</button>
      </div>
    </div>
    <div class="bp-drawer-body" id="bp-drawer-body"></div>
  </div>

  <footer id="site-footer" class="footer"></footer>

  <script src="/js/supabase-lite.js"></script>
  <script src="/js/theme-lite.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    ThemeLite.init();
    Nav.render();
    Nav.renderFooter();

    const RARITY_COLORS = {
      common:    { border: '#555',    text: '#888',    bg: '#555' },
      rare:      { border: '#0078d4', text: '#60a5fa', bg: '#0078d4' },
      epic:      { border: '#8b5cf6', text: '#a78bfa', bg: '#8b5cf6' },
      legendary: { border: '#d97706', text: '#fbbf24', bg: '#d97706' },
      mythic:    { border: '#dc2626', text: '#f87171', bg: '#dc2626' },
    };

    const BPCatalog = (() => {
      let allData = [];
      let filtered = [];
      let currentType = 'spaceship';
      let currentCat = 'all';
      let currentRarity = 'all';
      let searchTerm = '';
      let page = 0;
      let drawerIndex = -1;
      let drawerKeyHandler = null;
      const PAGE_SIZE = 48;
      const RARITY_ORDER = { Common: 0, Rare: 1, Epic: 2, Legendary: 3, Mythic: 4 };

      function _esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

      async function init() {
        allData = await SBLite.query('blueprints', {
          select: 'id,name,type,category,rarity,description,flavor,serial_key,stats,config,tags,rating_avg,activation_count',
          order: 'name.asc',
          limit: 1000,
        }) || [];

        _buildCatFilters();
        _bindEvents();
        render();
      }

      function _buildCatFilters() {
        const cats = [...new Set(allData.filter(b => b.type === currentType).map(b => b.category).filter(Boolean))].sort();
        const el = document.getElementById('bp-cat-filters');
        el.querySelectorAll('.catalog-filter:not([data-cat="all"])').forEach(b => b.remove());
        cats.forEach(cat => {
          const btn = document.createElement('button');
          btn.className = 'catalog-filter';
          btn.dataset.cat = cat;
          btn.textContent = cat;
          el.appendChild(btn);
        });
      }

      function _bindEvents() {
        let debounce;
        document.getElementById('bp-search').addEventListener('input', e => {
          clearTimeout(debounce);
          debounce = setTimeout(() => { searchTerm = e.target.value.toLowerCase().trim(); page = 0; render(); }, 200);
        });

        document.getElementById('bp-tabs').addEventListener('click', e => {
          const tab = e.target.closest('.bp-tab');
          if (!tab) return;
          document.querySelectorAll('.bp-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentType = tab.dataset.type;
          currentCat = 'all';
          currentRarity = 'all';
          page = 0;
          _buildCatFilters();
          document.querySelectorAll('.catalog-filter').forEach(b => b.classList.remove('active'));
          document.querySelector('[data-cat="all"]').classList.add('active');
          document.querySelectorAll('.bp-rarity-btn').forEach(b => b.classList.remove('active'));
          document.querySelector('[data-rarity="all"]').classList.add('active');
          render();
        });

        document.getElementById('bp-cat-filters').addEventListener('click', e => {
          const btn = e.target.closest('.catalog-filter');
          if (!btn) return;
          document.querySelectorAll('.catalog-filter').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentCat = btn.dataset.cat;
          page = 0;
          render();
        });

        document.getElementById('bp-rarity-filters').addEventListener('click', e => {
          const btn = e.target.closest('.bp-rarity-btn');
          if (!btn) return;
          document.querySelectorAll('.bp-rarity-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentRarity = btn.dataset.rarity;
          page = 0;
          render();
        });

        document.getElementById('bp-load-btn').addEventListener('click', () => { page++; render(true); });

        // Drawer events
        document.getElementById('bp-drawer-close').addEventListener('click', _closeDrawer);
        document.getElementById('bp-drawer-overlay').addEventListener('click', _closeDrawer);
        document.getElementById('bp-drawer-prev').addEventListener('click', () => _navigateDrawer(-1));
        document.getElementById('bp-drawer-next').addEventListener('click', () => _navigateDrawer(1));
      }

      // ── Drawer ──
      function _openDrawer(bp) {
        drawerIndex = filtered.findIndex(b => b.id === bp.id);
        _renderDrawer(bp);
        requestAnimationFrame(() => {
          document.getElementById('bp-drawer').classList.add('open');
          document.getElementById('bp-drawer-overlay').classList.add('open');
        });
        document.body.style.overflow = 'hidden';

        drawerKeyHandler = e => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
          if (e.key === 'Escape') _closeDrawer();
          else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); _navigateDrawer(-1); }
          else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); _navigateDrawer(1); }
        };
        document.addEventListener('keydown', drawerKeyHandler);
      }

      function _closeDrawer() {
        document.getElementById('bp-drawer').classList.remove('open');
        document.getElementById('bp-drawer-overlay').classList.remove('open');
        document.body.style.overflow = '';
        if (drawerKeyHandler) {
          document.removeEventListener('keydown', drawerKeyHandler);
          drawerKeyHandler = null;
        }
      }

      function _navigateDrawer(dir) {
        const next = drawerIndex + dir;
        if (next < 0 || next >= filtered.length) return;
        drawerIndex = next;
        _renderDrawer(filtered[drawerIndex]);
      }

      function _renderDrawer(bp) {
        const rarity = (bp.rarity || 'common').toLowerCase();
        const rc = RARITY_COLORS[rarity] || RARITY_COLORS.common;
        const appUrl = 'https://nicespaceship.ai/#/bridge/' + (bp.type === 'spaceship' ? 'spaceships' : 'agents') + '/' + bp.id;
        const isShip = bp.type === 'spaceship';
        const desc = bp.description || '';
        const flavor = bp.flavor || desc.split('.')[0] + '.';
        const serial = bp.serial_key || bp.id.replace(/[^a-z0-9-]/gi, '').toUpperCase();
        const s = bp.stats || {};
        const cfg = bp.config || {};
        const tools = cfg.tools || [];
        const installs = bp.activation_count || 0;

        document.getElementById('bp-drawer-title').textContent = bp.name;

        // Stats bar
        const stats = isShip
          ? '<div class="tcg-stat"><span class="tcg-stat-val">' + (s.crew || 0) + '</span><span class="tcg-stat-lbl">AGENTS</span></div>' +
            '<div class="tcg-stat"><span class="tcg-stat-val">' + (s.slots || 0) + '</span><span class="tcg-stat-lbl">SLOTS</span></div>' +
            '<div class="tcg-stat"><span class="tcg-stat-val">' + installs + '</span><span class="tcg-stat-lbl">DEPLOYS</span></div>'
          : '<div class="tcg-stat"><span class="tcg-stat-val">' + (s.speed || 0) + '</span><span class="tcg-stat-lbl">SPD</span></div>' +
            '<div class="tcg-stat"><span class="tcg-stat-val">' + (s.accuracy || 0) + '</span><span class="tcg-stat-lbl">ACC</span></div>' +
            '<div class="tcg-stat"><span class="tcg-stat-val">' + (s.creativity || 0) + '</span><span class="tcg-stat-lbl">CRE</span></div>';

        // Marquee
        const marquee = isShip
          ? '<div class="tcg-marquee"><div class="tcg-marquee-track">' +
              '<span>' + _esc(desc) + '</span>' +
              '<span>' + _esc(desc) + '</span>' +
            '</div></div>'
          : '';

        // Role label
        const roleLabel = isShip ? _esc(bp.category || '') : _esc(cfg.role || bp.category || '');

        // Slot diagram for ships
        const slotCount = parseInt(s.crew || s.slots || 6, 10);
        const slotColors = ['#fbbf24','#60a5fa','#a78bfa','#34d399','#fb923c','#f87171','#e879f9','#38bdf8','#facc15','#4ade80','#f472b6','#818cf8'];
        let slotCircles = '';
        const angleStep = (2 * Math.PI) / Math.max(slotCount, 1);
        for (let i = 0; i < slotCount && i < 12; i++) {
          const cx = 50 + 30 * Math.cos(angleStep * i - Math.PI/2);
          const cy = 50 + 30 * Math.sin(angleStep * i - Math.PI/2);
          slotCircles +=
            '<circle cx="'+cx+'" cy="'+cy+'" r="7" stroke="#555" stroke-width="0.4" fill="none" opacity="0.3" stroke-dasharray="3 2"/>' +
            '<circle cx="'+cx+'" cy="'+cy+'" r="2.5" fill="'+slotColors[i % slotColors.length]+'" opacity="0.7"/>' +
            '<line x1="50" y1="50" x2="'+cx+'" y2="'+cy+'" stroke="#555" stroke-width="0.3" opacity="0.15"/>';
        }

        const artContent = isShip
          ? '<svg class="tcg-slot-diagram" viewBox="0 0 100 100" fill="none">' +
              '<circle cx="50" cy="50" r="16" stroke="' + rc.text + '" stroke-width="0.5" fill="none" opacity="0.3"/>' +
              '<circle cx="50" cy="50" r="9" stroke="' + rc.text + '" stroke-width="0.3" fill="none" opacity="0.15" stroke-dasharray="3 2"/>' +
              '<circle cx="50" cy="50" r="3" fill="' + rc.text + '" opacity="0.6"/>' +
              slotCircles +
            '</svg>'
          : '<svg class="tcg-slot-diagram" viewBox="0 0 100 100" fill="none">' +
              '<circle cx="50" cy="50" r="25" stroke="' + rc.text + '" stroke-width="0.5" fill="none" opacity="0.2"/>' +
              '<circle cx="50" cy="50" r="15" stroke="' + rc.text + '" stroke-width="0.3" fill="none" opacity="0.1" stroke-dasharray="3 2"/>' +
              '<circle cx="50" cy="50" r="5" fill="' + rc.text + '" opacity="0.5"/>' +
            '</svg>';

        // Capabilities (tools for agents)
        let capsHtml = '';
        if (tools.length) {
          capsHtml = tools.slice(0, 4).map(t =>
            '<p class="tcg-cap"><span style="color:' + rc.text + '">&#x25C6;</span> ' + _esc(typeof t === 'string' ? t : t.name || '') + '</p>'
          ).join('');
        }

        document.getElementById('bp-drawer-body').innerHTML =
          // TCG Card
          '<div class="tcg-card" data-rarity="' + rarity + '">' +
            '<div class="tcg-name-bar">' +
              '<span class="tcg-name">' + _esc(bp.name) + '</span>' +
            '</div>' +
            '<div class="tcg-art">' +
              '<div class="tcg-art-role"><span class="tcg-serial-code">' + roleLabel + '</span></div>' +
              '<div class="tcg-art-class"><span class="tcg-serial-code rarity-badge" style="color:' + rc.text + ';border-color:' + rc.border + '">' + _esc(bp.rarity || 'Common').toUpperCase() + '</span></div>' +
              '<div class="tcg-art-serial"><span class="tcg-serial-code">' + _esc(serial) + '</span></div>' +
              artContent +
            '</div>' +
            marquee +
            '<div class="tcg-text-box">' +
              '<p class="tcg-flavor">"' + _esc(flavor) + '"</p>' +
              capsHtml +
            '</div>' +
            '<div class="tcg-stats">' + stats + '</div>' +
          '</div>' +

          // Description
          '<div class="bp-drawer-desc">' + _esc(desc) + '</div>' +

          // Stars + installs
          '<div style="display:flex;align-items:center;gap:12px;font-size:0.78rem;color:var(--text-dim)">' +
            '<span style="letter-spacing:2px">&#9733;&#9733;&#9733;&#9733;&#9733;</span>' +
            '<span>' + installs + ' installs</span>' +
          '</div>' +

          // Actions
          '<div class="bp-drawer-actions">' +
            '<a href="' + appUrl + '" target="_blank" rel="noopener" class="btn-primary">Open in NICE</a>' +
          '</div>';
      }

      function render(append) {
        filtered = allData.filter(b => {
          if (b.type !== currentType) return false;
          if (currentCat !== 'all' && b.category !== currentCat) return false;
          if (currentRarity !== 'all' && (b.rarity || 'Common').toLowerCase() !== currentRarity) return false;
          if (searchTerm && !b.name.toLowerCase().includes(searchTerm) && !(b.description || '').toLowerCase().includes(searchTerm) && !(b.category || '').toLowerCase().includes(searchTerm)) return false;
          return true;
        });

        if (currentRarity === 'all' && currentCat === 'all' && !searchTerm) {
          filtered.sort((a, b) => a.name.localeCompare(b.name));
        } else {
          filtered.sort((a, b) => (RARITY_ORDER[b.rarity] || 0) - (RARITY_ORDER[a.rarity] || 0) || a.name.localeCompare(b.name));
        }

        const total = filtered.length;
        const end = (page + 1) * PAGE_SIZE;
        const slice = filtered.slice(0, end);

        document.getElementById('bp-count').textContent = total + ' ' + currentType + (total !== 1 ? 's' : '');

        const grid = document.getElementById('bp-grid');
        if (!append) grid.innerHTML = '';

        const startIdx = append ? page * PAGE_SIZE : 0;
        const items = append ? filtered.slice(startIdx, startIdx + PAGE_SIZE) : slice;

        if (total === 0 && !append) {
          grid.innerHTML = '<div class="catalog-empty">No blueprints match your filters.</div>';
        }

        items.forEach(bp => {
          const card = document.createElement('div');
          card.className = 'bp-card';
          card.setAttribute('role', 'button');
          card.setAttribute('tabindex', '0');
          card.innerHTML =
            '<div class="bp-card-header">' +
              '<h3>' + _esc(bp.name) + '</h3>' +
              '<span class="bp-card-category">' + _esc(bp.category || '') + '</span>' +
            '</div>' +
            '<p class="bp-card-desc">' + _esc(bp.description || '') + '</p>' +
            '<div class="bp-card-footer">' +
              '<span class="bp-card-rarity ' + (bp.rarity || 'common').toLowerCase() + '">' + _esc(bp.rarity || 'Common') + '</span>' +
              '<span class="bp-card-type">' + (bp.type === 'spaceship' ? 'Spaceship' : 'Agent') + '</span>' +
            '</div>';
          card.addEventListener('click', () => _openDrawer(bp));
          card.addEventListener('keydown', e => { if (e.key === 'Enter') _openDrawer(bp); });
          grid.appendChild(card);
        });

        document.getElementById('bp-load-wrap').style.display = end < total ? '' : 'none';
      }

      return { init };
    })();

    BPCatalog.init();
  </script>
</body>
</html>
