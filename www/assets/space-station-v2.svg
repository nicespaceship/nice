<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none" stroke="#a5b4fc" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
  <!-- Circular station — rotating ring design -->

  <!-- Outer ring -->
  <circle cx="300" cy="300" r="240" stroke-width="15"/>
  <circle cx="300" cy="300" r="225" stroke-dasharray="4,8" stroke-width="1"/>
  <circle cx="300" cy="300" r="255" stroke-dasharray="1,6" stroke-width="0.5"/>

  <!-- Ring segments (8 sections) -->
  <line x1="300" y1="60" x2="300" y2="70"/>
  <line x1="300" y1="530" x2="300" y2="540"/>
  <line x1="60" y1="300" x2="70" y2="300"/>
  <line x1="530" y1="300" x2="540" y2="300"/>
  <line x1="130" y1="130" x2="138" y2="138"/>
  <line x1="462" y1="130" x2="470" y2="138"/>
  <line x1="130" y1="470" x2="138" y2="462"/>
  <line x1="462" y1="470" x2="470" y2="462"/>

  <!-- Inner ring (habitat ring) -->
  <circle cx="300" cy="300" r="120" stroke-width="1"/>
  <circle cx="300" cy="300" r="110" stroke-dasharray="3,5" stroke-width="0.4"/>

  <!-- Hub core -->
  <circle cx="300" cy="300" r="40" stroke-width="1.2"/>
  <circle cx="300" cy="300" r="28" stroke-width="0.6"/>
  <circle cx="300" cy="300" r="12" fill="#a5b4fc" fill-opacity="0.08"/>

  <!-- 8 spokes connecting rings -->
  <line x1="300" y1="60" x2="300" y2="180"/>
  <line x1="300" y1="420" x2="300" y2="540"/>
  <line x1="60" y1="300" x2="180" y2="300"/>
  <line x1="420" y1="300" x2="540" y2="300"/>
  <line x1="130" y1="130" x2="215" y2="215"/>
  <line x1="470" y1="130" x2="385" y2="215"/>
  <line x1="130" y1="470" x2="215" y2="385"/>
  <line x1="470" y1="470" x2="385" y2="385"/>

  <!-- Solar panel arrays (4 positions) -->
  <!-- Top -->
  <rect x="270" y="42" width="24" height="16" rx="2"/>
  <rect x="306" y="42" width="24" height="16" rx="2"/>
  <line x1="276" y1="50" x2="290" y2="50" stroke-width="0.4"/>
  <line x1="312" y1="50" x2="326" y2="50" stroke-width="0.4"/>
  <!-- Bottom -->
  <rect x="270" y="542" width="24" height="16" rx="2"/>
  <rect x="306" y="542" width="24" height="16" rx="2"/>
  <!-- Left -->
  <rect x="42" y="270" width="16" height="24" rx="2"/>
  <rect x="42" y="306" width="16" height="24" rx="2"/>
  <!-- Right -->
  <rect x="542" y="270" width="16" height="24" rx="2"/>
  <rect x="542" y="306" width="16" height="24" rx="2"/>

  <!-- Docking ports on inner ring -->
  <rect x="293" y="176" width="14" height="8" rx="2"/>
  <rect x="293" y="416" width="14" height="8" rx="2"/>
  <rect x="176" y="293" width="8" height="14" rx="2"/>
  <rect x="416" y="293" width="8" height="14" rx="2"/>

  <!-- Habitat modules on inner ring (6 pods) -->
  <circle cx="300" cy="180" r="10" stroke-width="0.8"/>
  <circle cx="404" cy="240" r="10" stroke-width="0.8"/>
  <circle cx="404" cy="360" r="10" stroke-width="0.8"/>
  <circle cx="300" cy="420" r="10" stroke-width="0.8"/>
  <circle cx="196" cy="360" r="10" stroke-width="0.8"/>
  <circle cx="196" cy="240" r="10" stroke-width="0.8"/>

  <!-- Module windows -->
  <circle cx="300" cy="180" r="4" stroke-width="0.4"/>
  <circle cx="404" cy="240" r="4" stroke-width="0.4"/>
  <circle cx="404" cy="360" r="4" stroke-width="0.4"/>
  <circle cx="300" cy="420" r="4" stroke-width="0.4"/>
  <circle cx="196" cy="360" r="4" stroke-width="0.4"/>
  <circle cx="196" cy="240" r="4" stroke-width="0.4"/>

  <!-- Antenna arrays -->
  <line x1="300" y1="260" x2="300" y2="272"/>
  <line x1="290" y1="265" x2="310" y2="265" stroke-width="0.6"/>
  <circle cx="300" cy="258" r="3" stroke-width="0.5"/>
</svg>
