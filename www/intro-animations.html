<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NICE icon — intro animation sandbox</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #f5f6f8;
    --ink: #0c0d10;
    --ink-soft: #5a5e66;
    --line: #e1e3e8;
    --accent: #0f52ba; /* Sapphire */
    --accent-soft: rgba(15,82,186,0.12);
    --picker-bg: rgba(255,255,255,0.86);
    --chip-bg: #ffffff;
    --dot-color: #000000; /* How-stage dot color before colorize */
  }
  body[data-theme="dark"] {
    --bg: #0a0c12;
    --bg-soft: #181b24;
    --ink: #f5f6f8;
    --ink-soft: #8d93a0;
    --line: #2c3140;
    --accent: #4d8eff;
    --accent-soft: rgba(77,142,255,0.16);
    --picker-bg: rgba(20,24,32,0.86);
    --chip-bg: #000000;
    --dot-color: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    overflow: hidden;
  }
  .picker {
    position: fixed;
    top: 24px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px;
    background: var(--picker-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 8px;
    border: 1px solid var(--line);
    border-radius: 14px;
    z-index: 100;
    font-size: 13px;
  }
  .picker { top: 28px; }
  .picker-stage { top: 102px; }
  .picker-stage button.is-active {
    background: var(--accent);
    border-color: var(--accent);
  }
  .picker-eyebrow {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    color: var(--ink-soft);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    z-index: 100;
    pointer-events: none;
  }
  .picker-eyebrow.is-anim  { top: 10px; }
  .picker-eyebrow.is-stage { top: 84px; }
  .picker button {
    appearance: none;
    background: transparent;
    border: 1px solid transparent;
    color: var(--ink-soft);
    font: inherit;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .picker button:hover { background: var(--bg-soft); color: var(--ink); }
  .picker button.is-active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .replay {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    font: inherit;
    font-size: 13px;
    padding: 12px 22px;
    border-radius: 999px;
    cursor: pointer;
    z-index: 100;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  }
  .replay:hover { background: var(--accent); color: #fff; }
  .theme-toggle {
    position: fixed;
    bottom: 24px; right: 24px;
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--picker-bg);
    border: 1px solid var(--line);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--ink);
    cursor: pointer;
    font-size: 18px;
    z-index: 100;
    transition: transform 0.2s ease;
  }
  .theme-toggle:hover { transform: scale(1.06); }
  .label {
    position: fixed;
    bottom: 80px; left: 50%;
    transform: translateX(-50%);
    color: var(--ink-soft);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    z-index: 100;
    text-align: center;
  }
  .label .row { display: block; }
  .label .row + .row { margin-top: 4px; }

  .stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .mark-wrap {
    position: relative;
    width: 60vmin; height: 60vmin;
    transition: transform 1s cubic-bezier(0.2, 0.8, 0.3, 1);
  }
  /* Zoom the entire composition on How (and Inside, which inherits How's
     end state) so the agent cards read clearly. */
  .mark-wrap[data-stage="how"],
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) {
    transform: scale(1.35);
  }
  .stage-ring {
    position: absolute; left: 50%; top: 50%;
    width: 100%; height: 100%;
    border: 1px solid var(--accent);
    border-radius: 50%;
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.85);
    pointer-events: none;
  }
  .mark {
    width: 100%; height: 100%;
    fill: var(--ink);
    transform-origin: 50% 50%;
    filter: drop-shadow(0 0 80px rgba(15,82,186,0.10));
  }
  .mark > g { transform-origin: 2500px 2500px; }
  /* Force .mark-core into its own compositing layer so it ALWAYS paints
     on top of .agent-cards' transformed layer during Launch's spiral —
     CSS transforms on SVG groups can create compositing layers that
     escape DOM-order painting in some browsers. translateZ(0) is a
     visual no-op but promotes mark-core to its own layer, which (being
     later in DOM than .agent-cards) composites above it.
     Cards visibly slip BEHIND the core's ring + inner dot at end of spiral. */
  .mark > g.mark-core {
    will-change: transform;
    transform: translateZ(0);
  }

  /* Centered flash overlay used by singularity */
  .flash {
    position: absolute; left: 50%; top: 50%;
    width: 20px; height: 20px;
    background: radial-gradient(circle, #fff 0%, rgba(255,255,255,0) 70%);
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0);
    pointer-events: none;
    z-index: 2;
  }
  /* Schematic grid crosshair overlay */
  .crosshair {
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0;
    background:
      linear-gradient(to right, transparent calc(50% - 0.5px), var(--accent) calc(50% - 0.5px), var(--accent) calc(50% + 0.5px), transparent calc(50% + 0.5px)),
      linear-gradient(to bottom, transparent calc(50% - 0.5px), var(--accent) calc(50% - 0.5px), var(--accent) calc(50% + 0.5px), transparent calc(50% + 0.5px));
  }

  /* ===========================================================
     1. BOOT-UP — chevrons → core → orbit dots → pillars
     =========================================================== */
  .mark-wrap[data-anim="boot"] .mark-chevrons { animation: boot-chevrons 0.45s cubic-bezier(0.2,1,0.3,1) 0s both; }
  .mark-wrap[data-anim="boot"] .mark-core     { animation: boot-core 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.4s both; }
  .mark-wrap[data-anim="boot"] .mark-orbit path { opacity: 0; transform-origin: 2500px 2500px; }
  .mark-wrap[data-anim="boot"] .mark-orbit path:nth-child(1) { animation: boot-orbit-dot 0.4s cubic-bezier(0.2,1,0.3,1) 0.55s both; }
  .mark-wrap[data-anim="boot"] .mark-orbit path:nth-child(2) { animation: boot-orbit-dot 0.4s cubic-bezier(0.2,1,0.3,1) 0.62s both; }
  .mark-wrap[data-anim="boot"] .mark-orbit path:nth-child(3) { animation: boot-orbit-dot 0.4s cubic-bezier(0.2,1,0.3,1) 0.69s both; }
  .mark-wrap[data-anim="boot"] .mark-orbit path:nth-child(4) { animation: boot-orbit-dot 0.4s cubic-bezier(0.2,1,0.3,1) 0.76s both; }
  .mark-wrap[data-anim="boot"] .mark-orbit path:nth-child(5) { animation: boot-orbit-dot 0.4s cubic-bezier(0.2,1,0.3,1) 0.83s both; }
  .mark-wrap[data-anim="boot"] .mark-orbit path:nth-child(6) { animation: boot-orbit-dot 0.4s cubic-bezier(0.2,1,0.3,1) 0.9s both; }
  .mark-wrap[data-anim="boot"] .mark-pillars  { animation: boot-pillars 0.35s cubic-bezier(0.2,1,0.3,1) 1.0s both; }
  .mark-wrap[data-anim="boot"] .stage-ring-1 { animation: ring-flash 0.6s ease-out 0.45s both; }

  @keyframes boot-chevrons {
    from { transform: scale(2.4); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  @keyframes boot-core {
    0%   { transform: scale(0); opacity: 0; }
    60%  { transform: scale(1.18); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes boot-orbit-dot {
    from { transform: scale(0.4); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  @keyframes boot-pillars {
    from { transform: scaleY(0); opacity: 0; }
    to   { transform: scaleY(1); opacity: 1; }
  }
  @keyframes ring-flash {
    0%   { transform: translate(-50%, -50%) scale(0.85); opacity: 0.5; }
    100% { transform: translate(-50%, -50%) scale(1.3); opacity: 0; }
  }

  /* ===========================================================
     2. SCHEMATIC — circular reveal from center + crosshair flash
     =========================================================== */
  .mark-wrap[data-anim="schematic"] .mark {
    animation: schematic-reveal 1.4s cubic-bezier(0.4,0,0.2,1) both;
  }
  .mark-wrap[data-anim="schematic"] .crosshair {
    animation: crosshair-flash 1.6s ease-out both;
  }
  @keyframes schematic-reveal {
    0%   { clip-path: circle(0% at 50% 50%); opacity: 0.85; }
    40%  { opacity: 1; }
    100% { clip-path: circle(75% at 50% 50%); opacity: 1; }
  }
  @keyframes crosshair-flash {
    0%   { opacity: 0; }
    20%  { opacity: 0.35; }
    70%  { opacity: 0.2; }
    100% { opacity: 0; }
  }

  /* ===========================================================
     3. SINGULARITY — single point → flash → big bang outward
     =========================================================== */
  .mark-wrap[data-anim="singularity"] .mark-orbit    { animation: singularity-fade 0.5s ease-out 0.55s both; }
  .mark-wrap[data-anim="singularity"] .mark-chevrons { animation: singularity-fade 0.5s ease-out 0.75s both; }
  .mark-wrap[data-anim="singularity"] .mark-pillars  { animation: singularity-fade 0.5s ease-out 0.75s both; }
  .mark-wrap[data-anim="singularity"] .mark-core     { animation: singularity-core 0.8s cubic-bezier(0.2,1.6,0.4,1) 0.25s both; }
  .mark-wrap[data-anim="singularity"] .flash         { animation: singularity-flash 0.6s ease-out 0.15s both; }
  .mark-wrap[data-anim="singularity"] .stage-ring-1  { animation: singularity-ring 0.9s cubic-bezier(0.2,0.8,0.4,1) 0.25s both; }
  .mark-wrap[data-anim="singularity"] .stage-ring-2  { animation: singularity-ring 0.9s cubic-bezier(0.2,0.8,0.4,1) 0.45s both; }
  .mark-wrap[data-anim="singularity"] .stage-ring-3  { animation: singularity-ring 0.9s cubic-bezier(0.2,0.8,0.4,1) 0.65s both; }

  @keyframes singularity-fade {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes singularity-core {
    0%   { opacity: 0; transform: scale(0); }
    50%  { opacity: 1; transform: scale(1.4); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes singularity-flash {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0); }
    30%  { opacity: 1; transform: translate(-50%, -50%) scale(40); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(80); }
  }
  @keyframes singularity-ring {
    0%   { transform: translate(-50%, -50%) scale(0); opacity: 0.8; }
    100% { transform: translate(-50%, -50%) scale(1.7); opacity: 0; }
  }

  /* ===========================================================
     4. CONSTELLATION — dots twinkle in, then connectors appear,
        then the whole mark settles into a slow clockwise rotation
     =========================================================== */
  .mark-wrap[data-anim="constellation"] .mark {
    animation: const-spin 1.5s linear 2.65s both;
  }
  .mark-wrap[data-anim="constellation"] .mark-core      { animation: const-fade 0.6s ease-out 0s both; }
  .mark-wrap[data-anim="constellation"] .mark-orbit path { opacity: 0; transform-origin: 2500px 2500px; }
  .mark-wrap[data-anim="constellation"] .mark-orbit path:nth-child(1) { animation: const-twinkle 0.7s ease-out 0.4s both; }
  .mark-wrap[data-anim="constellation"] .mark-orbit path:nth-child(2) { animation: const-twinkle 0.7s ease-out 0.95s both; }
  .mark-wrap[data-anim="constellation"] .mark-orbit path:nth-child(3) { animation: const-twinkle 0.7s ease-out 0.6s both; }
  .mark-wrap[data-anim="constellation"] .mark-orbit path:nth-child(4) { animation: const-twinkle 0.7s ease-out 1.15s both; }
  .mark-wrap[data-anim="constellation"] .mark-orbit path:nth-child(5) { animation: const-twinkle 0.7s ease-out 0.75s both; }
  .mark-wrap[data-anim="constellation"] .mark-orbit path:nth-child(6) { animation: const-twinkle 0.7s ease-out 1.3s both; }
  .mark-wrap[data-anim="constellation"] .mark-pillars  { animation: const-line 0.7s ease-out 1.8s both; }
  .mark-wrap[data-anim="constellation"] .mark-chevrons { animation: const-line 0.7s ease-out 1.95s both; }

  @keyframes const-fade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes const-twinkle {
    0%   { opacity: 0; transform: scale(0.3); }
    50%  { opacity: 1; transform: scale(1.4); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes const-line {
    from { opacity: 0; transform: scale(1.1); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes const-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ===========================================================
     5. MAGNETIC — scattered pieces converge with overshoot
     =========================================================== */
  .mark-wrap[data-anim="magnetic"] .mark-orbit    { animation: magnet-out-in 0.95s cubic-bezier(0.34,1.4,0.5,1) 0s both; }
  .mark-wrap[data-anim="magnetic"] .mark-chevrons { animation: magnet-far-in 1.0s cubic-bezier(0.34,1.4,0.5,1) 0.05s both; }
  .mark-wrap[data-anim="magnetic"] .mark-pillars  { animation: magnet-tall-in 0.9s cubic-bezier(0.34,1.4,0.5,1) 0.15s both; }
  .mark-wrap[data-anim="magnetic"] .mark-core     { animation: magnet-tiny-in 0.85s cubic-bezier(0.34,1.4,0.5,1) 0.2s both; }

  @keyframes magnet-out-in {
    from { transform: scale(2.2); opacity: 0; }
    65%  { transform: scale(0.94); opacity: 1; }
    100% { transform: scale(1); }
  }
  @keyframes magnet-far-in {
    from { transform: scale(3); opacity: 0; }
    65%  { transform: scale(0.93); opacity: 1; }
    100% { transform: scale(1); }
  }
  @keyframes magnet-tall-in {
    from { transform: scaleY(4) scaleX(0.6); opacity: 0; }
    65%  { transform: scaleY(0.94) scaleX(1.05); opacity: 1; }
    100% { transform: scaleY(1) scaleX(1); }
  }
  @keyframes magnet-tiny-in {
    from { transform: scale(0); opacity: 0; }
    65%  { transform: scale(1.12); opacity: 1; }
    100% { transform: scale(1); }
  }

  /* ===========================================================
     6. WARP — zoom from huge + blurred to landing
     =========================================================== */
  .mark-wrap[data-anim="warp"] .mark {
    animation: warp-in 0.85s cubic-bezier(0.22,1,0.36,1) both;
  }
  .mark-wrap[data-anim="warp"] .stage-ring-1 { animation: warp-trail 0.85s ease-out 0.2s both; }
  .mark-wrap[data-anim="warp"] .stage-ring-2 { animation: warp-trail 0.85s ease-out 0.35s both; }

  @keyframes warp-in {
    0%   { transform: scale(7); opacity: 0; filter: blur(40px); }
    60%  { transform: scale(1.06); opacity: 1; filter: blur(2px); }
    100% { transform: scale(1); opacity: 1; filter: blur(0); }
  }
  @keyframes warp-trail {
    0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0.5; }
    100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0; }
  }

  /* ===========================================================
     PARTICLES — two pools.
     .particles-spokes : 6 blue dots aligned with outer nodes
                          (Mission dispatch + Launch trails).
                          Blue = data within NICE.
     .particles-shower : 180 colored dots generated by JS
                          (Inside — data flowing in from outside).
     =========================================================== */
  .particles {
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .particle {
    position: absolute;
    left: 50%; top: 50%;
    border-radius: 50%;
    opacity: 0;
  }

  /* Spokes — fixed 6 dots, Sapphire */
  .particles-spokes .particle {
    width: 1.6vmin; height: 1.6vmin;
    margin: -0.8vmin 0 0 -0.8vmin;
    background: var(--accent);
    box-shadow: 0 0 12px rgba(15,82,186,0.6);
  }
  .particles-spokes .particle:nth-child(1) { --angle:   0deg; --delay: 0s;    }
  .particles-spokes .particle:nth-child(2) { --angle:  60deg; --delay: 0.12s; }
  .particles-spokes .particle:nth-child(3) { --angle: 120deg; --delay: 0.24s; }
  .particles-spokes .particle:nth-child(4) { --angle: 180deg; --delay: 0.36s; }
  .particles-spokes .particle:nth-child(5) { --angle: 240deg; --delay: 0.48s; }
  .particles-spokes .particle:nth-child(6) { --angle: 300deg; --delay: 0.60s; }

  /* Shower — 180 small dots, random angles/delays/colors via JS */
  .particles-shower .particle {
    width: 1vmin; height: 1vmin;
    margin: -0.5vmin 0 0 -0.5vmin;
    /* background + --angle + --delay set inline by JS */
  }

  /* ============================================================
     STAGE: INTRO — no continuous loop. Constellation reveal + spin
     plays from data-anim; otherwise the icon just sits there.
     ============================================================ */

  /* ============================================================
     STAGES: MISSION + PLATFORM — share the lit-up state.
     Mission adds the data shower. Platform inherits everything
     Mission ends with, so the cross-stage transition is seamless.
     Animation declarations are IDENTICAL across both selectors so
     the browser keeps animations running uninterrupted on switch.
     ============================================================ */

  /* Outer orbit: breathing scale pulse on Mission only.
     Platform replaces this with a collapse-to-core animation below. */
  .mark-wrap[data-stage="mission"] .mark-orbit {
    animation: orbit-intake-breath 4s ease-in-out infinite;
  }
  @keyframes orbit-intake-breath {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.12); }
  }

  /* Outer dots become white "chips" so logos read clearly */
  .mark-orbit path {
    transition: fill 0.5s ease, stroke 0.5s ease, stroke-width 0.5s ease;
  }
  .mark-wrap[data-stage="mission"]  .mark-orbit path,
  .mark-wrap[data-stage="platform"] .mark-orbit path {
    fill: var(--chip-bg);
    stroke: var(--accent);
    stroke-width: 40;
  }

  /* Core outer ring: RGB cycle + breathing scale pulse.
     2.4s delay matches the first shower contact on Mission; on
     Platform there's no shower but we keep the same delay so the
     animation declaration is identical and Mission→Platform doesn't
     restart the cycle mid-color. */
  .mark-wrap[data-stage="mission"]  .mark-core path:nth-child(1),
  .mark-wrap[data-stage="platform"] .mark-core path:nth-child(1) {
    transform-origin: 2500px 2500px;
    animation:
      core-rgb-cycle 3.5s linear 2.4s infinite,
      ring-breath 3s ease-in-out 2.4s infinite;
  }
  .mark-wrap[data-stage="mission"]  .mark-core path:nth-child(2),
  .mark-wrap[data-stage="platform"] .mark-core path:nth-child(2) {
    animation: core-rgb-cycle 3.5s linear 2.4s infinite;
  }
  @keyframes core-rgb-cycle {
    0%, 100% { fill: #ff3a3a; filter: drop-shadow(0 0 8px rgba(255, 58, 58, 0.85)); }
    33%      { fill: #3aff5b; filter: drop-shadow(0 0 8px rgba(58, 255, 91, 0.85)); }
    66%      { fill: #3a7bff; filter: drop-shadow(0 0 8px rgba(58, 123, 255, 0.85)); }
  }
  @keyframes ring-breath {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.08); }
  }

  /* The 6 connector paths (2 pillars + 4 chevrons) cycle RGB in sync */
  .mark-wrap[data-stage="mission"]  .mark-pillars path,
  .mark-wrap[data-stage="mission"]  .mark-chevrons path,
  .mark-wrap[data-stage="mission"]  .mark-chevrons polygon,
  .mark-wrap[data-stage="platform"] .mark-pillars path,
  .mark-wrap[data-stage="platform"] .mark-chevrons path,
  .mark-wrap[data-stage="platform"] .mark-chevrons polygon {
    animation: core-rgb-cycle 3.5s linear 2.4s infinite;
  }

  /* LLM logos: faded in on Mission, breath-synced with the orbit.
     Platform's collapse-to-core animation handles their exit. */
  .mark-logos { opacity: 0; transition: opacity 0.6s ease; }
  .mark-wrap[data-stage="mission"] .mark-logos {
    opacity: 1;
    transition-delay: 0.4s;
    animation: orbit-intake-breath 4s ease-in-out infinite;
  }

  /* ============================================================
     STAGE: PLATFORM — Mission's LLM nodes collapse into the core
     (0–0.8s), then 12 MCP nodes emerge from the core (0.7s onward)
     and settle into a two-ring layout (6 inner + 6 outer).
     Core/connectors/ring continue their RGB cycle uninterrupted.
     ============================================================ */
  .mark-wrap[data-stage="platform"] .mark-orbit,
  .mark-wrap[data-stage="platform"] .mark-logos {
    animation: collapse-to-core 0.8s cubic-bezier(0.5, 0, 0.75, 0) forwards;
  }
  /* How keeps logos hidden but reveals the orbit dots at the end */
  .mark-wrap[data-stage="how"] .mark-logos {
    animation: collapse-to-core 0.8s cubic-bezier(0.5, 0, 0.75, 0) forwards;
  }
  @keyframes collapse-to-core {
    0%   { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0); }
  }

  /* MCP orbit — two sub-groups so the outer ring can spin into place
     while the inner ring emerges straight. Both hidden until Platform. */
  .mcp-orbit-inner, .mcp-orbit-outer {
    opacity: 0;
    transform-origin: 2500px 2500px;
  }
  .mcp-orbit-inner { transform: scale(0); }
  .mcp-orbit-outer { transform: scale(0) rotate(-60deg); }

  .mark-wrap[data-stage="platform"] .mcp-orbit-inner {
    animation: emit-from-core 0.85s 0.2s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }
  .mark-wrap[data-stage="platform"] .mcp-orbit-outer {
    animation: emit-with-spin 1.0s 0.2s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }
  /* Removed the overshoot keyframe — single smooth motion eliminates the
     "settle pause" perception during the outer ring's rotation. */
  @keyframes emit-from-core {
    0%   { opacity: 0; transform: scale(0); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes emit-with-spin {
    0%   { opacity: 0; transform: scale(0) rotate(-60deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg);   }
  }

  /* MCP nodes: same chip styling as LLM dots — light bg in light mode,
     black bg in dark mode. Sapphire stroke in both. On Platform, the
     stroke cycles RGB in sync with the core. */
  .mcp-node circle {
    fill: var(--chip-bg);
    stroke: var(--accent);
    stroke-width: 40;
  }
  /* Apply on BOTH Mission and Platform with identical timing to the core
     animation (3.5s / 2.4s delay). On Mission the chips are hidden but
     the animation runs in sync — so when they appear on Platform, the
     stroke color matches the core's current color exactly. */
  .mark-wrap[data-stage="mission"]  .mcp-node circle,
  .mark-wrap[data-stage="platform"] .mcp-node circle {
    animation: chip-rgb-stroke 3.5s linear 2.4s infinite;
  }
  @keyframes chip-rgb-stroke {
    0%, 100% { stroke: #ff3a3a; }
    33%      { stroke: #3aff5b; }
    66%      { stroke: #3a7bff; }
  }
  /* Logos that are black-on-white by default need to invert in dark mode
     so they stay readable on the now-black chip. */
  body[data-theme="dark"] .invert-on-dark {
    filter: invert(1) brightness(1.1);
  }

  /* Data shower: full on Mission, ambient on Platform, hidden on How. */
  .mark-wrap[data-stage="mission"]  .particles-shower { opacity: 1; }
  .mark-wrap[data-stage="platform"] .particles-shower { opacity: 0.15; }
  .mark-wrap[data-stage="mission"] .particles-shower .particle {
    animation: shower-flow-in 2.6s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    animation-delay: var(--delay);
  }
  .mark-wrap[data-stage="platform"] .particles-shower .particle {
    animation: shower-flow-in 6s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    animation-delay: var(--delay);
  }
  @keyframes shower-flow-in {
    0%   { transform: rotate(var(--angle)) translateY(-80vmax); opacity: 0; }
    18%  { opacity: 1; }
    92%  { transform: rotate(var(--angle)) translateY(-1.5vmin); opacity: 1; }
    100% { transform: rotate(var(--angle)) translateY(0);        opacity: 0; }
  }

  /* ============================================================
     STAGE: PLATFORM — inherits Mission's full lit state above
     (white dots, logos, RGB core/ring/connectors, breathing).
     No data shower. Platform-specific behavior will layer here.
     ============================================================ */

  /* ============================================================
     STAGE: HOW — continuation of Platform.
     Phase 1 (0–1.5s): 12 MCP chips + the 6 connector lines spin
                       clockwise (full 360°).
     Phase 2 (1.5–2.3s): MCP chips collapse into the core (scale 0).
     Phase 3 (2.3–3.0s): The original 6 LLM-position dots reappear
                         at default monochrome — forming the NICE
                         brand mark.
     Core/connectors snap to default fill at stage start; the spin
     covers that visual moment.
     ============================================================ */
  .mark-wrap[data-stage="how"] .mcp-orbit-inner {
    animation: how-spin-collapse 2.3s cubic-bezier(0.45, 0, 0.55, 1) forwards;
  }
  .mark-wrap[data-stage="how"] .mcp-orbit-outer {
    animation: how-spin-collapse 2.3s cubic-bezier(0.45, 0, 0.55, 1) forwards;
  }
  @keyframes how-spin-collapse {
    0%   { opacity: 1; transform: scale(1)    rotate(0deg);   }
    65%  { opacity: 1; transform: scale(0.95) rotate(360deg); }
    100% { opacity: 0; transform: scale(0)    rotate(360deg); }
  }

  /* Connectors spin in lockstep, then hold at the original orientation */
  .mark-wrap[data-stage="how"] .mark-pillars,
  .mark-wrap[data-stage="how"] .mark-chevrons {
    transform-origin: 2500px 2500px;
    animation: how-lines-spin 2.3s cubic-bezier(0.45, 0, 0.55, 1) forwards;
  }
  @keyframes how-lines-spin {
    0%   { transform: rotate(0deg); }
    65%  { transform: rotate(360deg); }
    100% { transform: rotate(360deg); }
  }

  /* Group reveals as the NICE icon. The 6 individual dots morph
     sequentially (next block) — no group-level fade. */
  .mark-wrap[data-stage="how"] .mark-orbit {
    animation: how-orbit-reveal 3s ease-out forwards;
  }
  @keyframes how-orbit-reveal {
    0%   { opacity: 0; transform: scale(0); }
    65%  { opacity: 0; transform: scale(0); }
    85%  { opacity: 1; transform: scale(1.08); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* Per-dot morph — SCOPED to How stage only, so other stages
     (Intro constellation, Mission/Platform chip rules) keep their
     default path-level transform-origin (2500px 2500px). The dots
     also fill BLACK during How (not the theme-dependent --ink), so
     they read as "empty slots" during the settle phase before they
     colorize into rarities. */
  .mark-wrap[data-stage="how"] .mark-orbit path {
    fill: var(--dot-color); /* black in light mode, white in dark mode */
    opacity: 1; /* override the constellation intro's opacity: 0 on paths */
    transform-box: fill-box;
    transform-origin: 50% 50%;
  }
  /* Sequence:
     1. NICE icon reveals (0–3s, dots monochrome).
     2. Settle (3–5s).
     3. All 6 dots colorize to their rarity colors at the same time
        (5.0–5.5s). User sees the full hex of colored dots.
     4. Dots shrink one-by-one clockwise from top (5.5s, 6.0s, 6.5s,
        7.0s, 7.5s, 8.0s), each card growing in its place. */
  .mark-wrap[data-stage="how"] .mark-orbit path:nth-child(1) {
    --morph-color: #FF3EB5; /* Mythic */
    animation:
      dot-colorize 0.5s 4.0s ease-out forwards,
      dot-fade 0.8s 5.5s ease-in forwards;
  }
  .mark-wrap[data-stage="how"] .mark-orbit path:nth-child(2) {
    --morph-color: #FBBF24; /* Legendary */
    animation:
      dot-colorize 0.5s 4.2s ease-out forwards,
      dot-fade 0.8s 6.0s ease-in forwards;
  }
  .mark-wrap[data-stage="how"] .mark-orbit path:nth-child(3) {
    --morph-color: #C084FC; /* Epic */
    animation:
      dot-colorize 0.5s 4.4s ease-out forwards,
      dot-fade 0.8s 6.5s ease-in forwards;
  }
  .mark-wrap[data-stage="how"] .mark-orbit path:nth-child(4) {
    --morph-color: #60A5FA; /* Rare */
    animation:
      dot-colorize 0.5s 4.6s ease-out forwards,
      dot-fade 0.8s 7.0s ease-in forwards;
  }
  .mark-wrap[data-stage="how"] .mark-orbit path:nth-child(5) {
    --morph-color: #C084FC; /* Epic */
    animation:
      dot-colorize 0.5s 4.8s ease-out forwards,
      dot-fade 0.8s 7.5s ease-in forwards;
  }
  .mark-wrap[data-stage="how"] .mark-orbit path:nth-child(6) {
    --morph-color: #9CA3AF; /* Common */
    animation:
      dot-colorize 0.5s 5.0s ease-out forwards,
      dot-fade 0.8s 8.0s ease-in forwards;
  }
  @keyframes dot-colorize {
    0%   { fill: var(--dot-color); transform: scale(1); }
    60%  { fill: var(--morph-color); transform: scale(1.28); }
    100% { fill: var(--morph-color); transform: scale(1.1); }
  }
  /* Dot fades (no shrink) as its card clip-path expands from circle. */
  @keyframes dot-fade {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Agent blueprint cards — 6 cards push out from each NICE orbit dot
     starting at 5s (after NICE icon settles + 2s pause). Each card
     animates from its inner dot position (scale 0) to its outer
     position (scale 1), then locks. Rarities mixed for variety. */
  .agent-cards { opacity: 1; }
  .agent-card { opacity: 0; }
  /* Each card morphs via clip-path: starts as a tiny circle at the
     dot's position, expands as a circle/ellipse, then squares off
     into the rounded-rect card shape. SVG transform attribute keeps
     the card centered at its slot; CSS only animates clip-path +
     opacity, no scale. Matches the dot-fade for crossover effect. */
  .mark-wrap[data-stage="how"] .agent-card-1 { animation: card-morph 0.8s 5.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  .mark-wrap[data-stage="how"] .agent-card-2 { animation: card-morph 0.8s 6.0s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  .mark-wrap[data-stage="how"] .agent-card-3 { animation: card-morph 0.8s 6.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  .mark-wrap[data-stage="how"] .agent-card-4 { animation: card-morph 0.8s 7.0s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  .mark-wrap[data-stage="how"] .agent-card-5 { animation: card-morph 0.8s 7.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  .mark-wrap[data-stage="how"] .agent-card-6 { animation: card-morph 0.8s 8.0s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

  /* Card morph keyframe — circle expands into rounded rect via inset()
     clip-path with `round`. Same keyframe for all 6 cards because their
     position comes from each card's SVG transform attribute, not CSS. */
  @keyframes card-morph {
    0%   { opacity: 0; clip-path: inset(50% 50% 50% 50% round 50%); }
    12%  { opacity: 1; clip-path: inset(45% 45% 45% 45% round 50%); }
    55%  { opacity: 1; clip-path: inset(20% 35% 20% 35% round 40%); }
    100% { opacity: 1; clip-path: inset(0% 0% 0% 0% round 7%); }
  }

  /* Rarity colors for the blueprint cards */
  .rarity-common    { --card-stroke: #9CA3AF; --card-art:    #4B5563; }
  .rarity-rare      { --card-stroke: #60A5FA; --card-art:    #2563EB; }
  .rarity-epic      { --card-stroke: #C084FC; --card-art:    #7C3AED; }
  .rarity-legendary { --card-stroke: #FBBF24; --card-art:    #D97706; }
  .rarity-mythic    { --card-stroke: #FF3EB5; --card-art:    #8C52FF; }
  /* Mythic gets the RGB cycle on its border + badge (highest-rarity flair) */
  .rarity-mythic .card-border {
    animation: chip-rgb-stroke 3.5s linear infinite;
  }
  .rarity-mythic .card-badge {
    animation: core-rgb-cycle 3.5s linear infinite;
  }
  .agent-card .card-body   { fill: #14171F; }
  .agent-card .card-border { stroke: var(--card-stroke); stroke-width: 12; fill: none; }
  .agent-card .card-art    { fill: var(--card-art); }
  .agent-card .card-badge  { fill: var(--card-stroke); }
  .agent-card .card-text   { fill: #ffffff; font-family: 'Inter', sans-serif; font-weight: 800; }
  .agent-card .card-line   { fill: rgba(255,255,255,0.5); }

  /* MCP cycle + EQ bars + Mythic RGB are INSIDE-STAGE ONLY.
     On all other stages (including How), cards keep the generic
     look: placeholder white circle in the art area, two static
     gray lines, fixed Mythic stroke color. */
  .card-mcp { opacity: 0; }
  .eq-bar {
    fill: rgba(255, 255, 255, 0.55);
    transform-box: fill-box;
    transform-origin: center bottom;
    opacity: 0;
  }

  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .card-mcp {
    animation: card-mcp-cycle 60s linear infinite;
    animation-delay: var(--mcp-cycle-delay, 0s);
  }
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .eq-bar {
    opacity: 1;
    animation: eq-bounce 0.95s ease-in-out infinite;
    animation-delay: var(--eq-delay, 0s);
  }
  /* Hide the generic placeholder circle + 2 lines on Inside */
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .agent-card > circle { opacity: 0; }
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .card-line { opacity: 0; }

  @keyframes card-mcp-cycle {
    0%   { opacity: 0; }
    1%   { opacity: 1; }
    4%   { opacity: 1; }
    5%   { opacity: 0; }
    100% { opacity: 0; }
  }
  @keyframes eq-bounce {
    0%, 100% { transform: scaleY(0.16); }
    50%      { transform: scaleY(1);    }
  }

  /* ============================================================
     STAGE: INSIDE — inherits How's end state (NICE connectors + core
     with 6 agent cards in place) and adds a colorful card cascade
     in the background. Theme: abundance — "every major AI model,
     every major SaaS tool, 500+ blueprints".
     ============================================================ */
  /* Hide the inner orbit dots (they morphed into cards on How).
     `:nth-child(n)` matches the per-path constellation rule's specificity
     so we can override its const-twinkle animation. */
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .mark-orbit path:nth-child(n) {
    animation: none;
    opacity: 0;
  }
  /* Hide LLM logos (already collapsed) */
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .mark-logos { opacity: 0; }
  /* Show the 6 agent cards at their final state (full size + rounded) */
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .agent-card { opacity: 1; }

  /* End-of-Inside ripple — the 6 thick connector lines (2 pillars +
     4 chevrons) explode outward off-screen at 6s, followed at 6.2s by
     the background cascade scattering outward. Leaves a clean schematic
     (core + cards + data lines/particles) on a blank background. */
  .mark-wrap[data-stage="inside"] .mark-pillars,
  .mark-wrap[data-stage="inside"] .mark-chevrons {
    transform-origin: 2500px 2500px;
    animation: inside-connectors-ripple 1.4s 6s cubic-bezier(0.3, 0.1, 0.6, 1) forwards;
  }
  @keyframes inside-connectors-ripple {
    0%   { transform: scale(1); opacity: 1; }
    100% { transform: scale(3); opacity: 0; }
  }
  body.stage-inside .card-cascade {
    animation: inside-cascade-ripple 1.5s 6.2s ease-in forwards;
  }
  @keyframes inside-cascade-ripple {
    0%   { transform: scale(1);   opacity: 1; }
    100% { transform: scale(2.4) rotate(8deg); opacity: 0; }
  }

  /* After the data particles start traveling (1.1s), the core's outer
     ring + the 6 connector lines (2 pillars + 4 chevrons) transition
     to the same Sapphire blue as the data flow — same color family. */
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .mark-core path:nth-child(1),
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .mark-pillars path,
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .mark-chevrons path,
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .mark-chevrons polygon {
    animation: inside-blue-shift 0.7s 1.1s ease-out forwards;
  }
  @keyframes inside-blue-shift {
    to { fill: var(--accent); }
  }

  /* Inside data lines: extend from core outer ring to each agent card
     when Inside activates. ~900 units of stroke-dasharray covers the
     line length (~828 plus margin). */
  .inside-line {
    stroke: var(--accent);
    stroke-width: 8;
    fill: none;
    opacity: 0;
    stroke-dasharray: 900;
    stroke-dashoffset: 900;
  }
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .inside-line {
    opacity: 0.75;
    animation: inside-line-extend 0.9s 0.2s ease-out forwards;
  }
  @keyframes inside-line-extend {
    to { stroke-dashoffset: 0; }
  }

  /* Inside particles travel along each line from core → card. Each
     particle has its own keyframe (one per direction). Starts after
     the lines extend (delay ~1.1s). */
  .inside-particle {
    fill: var(--accent);
    opacity: 0;
    filter: drop-shadow(0 0 14px var(--accent));
  }
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .inside-particle-1 { animation: inside-travel-1 2.4s 1.1s linear infinite; }
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .inside-particle-2 { animation: inside-travel-2 2.4s 1.25s linear infinite; }
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .inside-particle-3 { animation: inside-travel-3 2.4s 1.4s linear infinite; }
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .inside-particle-4 { animation: inside-travel-4 2.4s 1.55s linear infinite; }
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .inside-particle-5 { animation: inside-travel-5 2.4s 1.7s linear infinite; }
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .inside-particle-6 { animation: inside-travel-6 2.4s 1.85s linear infinite; }

  @keyframes inside-travel-1 {
    0%   { transform: translate(2500px, 1850px); opacity: 0; }
    12%  { opacity: 1; }
    88%  { opacity: 1; }
    100% { transform: translate(2504px, 1022px); opacity: 0; }
  }
  @keyframes inside-travel-2 {
    0%   { transform: translate(3063px, 2175px); opacity: 0; }
    12%  { opacity: 1; }
    88%  { opacity: 1; }
    100% { transform: translate(3785px, 1766px); opacity: 0; }
  }
  @keyframes inside-travel-3 {
    0%   { transform: translate(3063px, 2825px); opacity: 0; }
    12%  { opacity: 1; }
    88%  { opacity: 1; }
    100% { transform: translate(3785px, 3255px); opacity: 0; }
  }
  @keyframes inside-travel-4 {
    0%   { transform: translate(2500px, 3150px); opacity: 0; }
    12%  { opacity: 1; }
    88%  { opacity: 1; }
    100% { transform: translate(2504px, 3981px); opacity: 0; }
  }
  @keyframes inside-travel-5 {
    0%   { transform: translate(1937px, 2825px); opacity: 0; }
    12%  { opacity: 1; }
    88%  { opacity: 1; }
    100% { transform: translate(1221px, 3255px); opacity: 0; }
  }
  @keyframes inside-travel-6 {
    0%   { transform: translate(1937px, 2175px); opacity: 0; }
    12%  { opacity: 1; }
    88%  { opacity: 1; }
    100% { transform: translate(1222px, 1758px); opacity: 0; }
  }

  /* Center core: 6 LLM logos fade in/out one at a time, 2.5s per logo,
     15s total cycle (loops). Only visible on Inside stage. */
  .core-llm { opacity: 0; }
  /* Theme-aware contrast for the originally-black logos on the core,
     since the core fill is var(--ink) which inverts between modes. */
  .core-llm-contrast { fill: var(--bg); }
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .core-llm {
    animation: core-llm-cycle 15s linear infinite;
  }
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .core-llm:nth-child(1) { animation-delay: 0s; }
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .core-llm:nth-child(2) { animation-delay: 2.5s; }
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .core-llm:nth-child(3) { animation-delay: 5s; }
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .core-llm:nth-child(4) { animation-delay: 7.5s; }
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .core-llm:nth-child(5) { animation-delay: 10s; }
  .mark-wrap:is([data-stage="inside"],[data-stage="launch"]) .core-llm:nth-child(6) { animation-delay: 12.5s; }
  @keyframes core-llm-cycle {
    0%, 17%, 100% { opacity: 0; }
    3%, 14%       { opacity: 1; }
  }
  .card-cascade {
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.8s ease;
    z-index: 0;
    overflow: hidden;
  }
  /* Cascade reveal on How (after the last agent card finishes morphing at
     ~8.8s), then stays visible on Inside + Launch. */
  body.stage-how .card-cascade {
    animation: cascade-reveal 0.8s 9.0s ease-out forwards;
  }
  @keyframes cascade-reveal {
    to { opacity: 1; }
  }
  body.stage-inside .card-cascade { opacity: 1; }
  /* Launch: cascade stays hidden (already pushed out by Inside's ripple). */

  .cascade-card {
    position: absolute;
    top: -16vh;
    width: 60px;
    height: 84px;
    border: 3px solid var(--cascade-color);
    border-radius: 8px;
    background: var(--bg-soft);
    box-shadow: 0 0 12px color-mix(in srgb, var(--cascade-color) 50%, transparent);
    animation: cascade-fall var(--cascade-duration) linear infinite;
    animation-delay: var(--cascade-delay);
    will-change: transform, opacity;
  }
  .cascade-card::before {
    /* small rarity-color band at top of card */
    content: "";
    position: absolute;
    inset: 6px 6px auto 6px;
    height: 36px;
    background: var(--cascade-color);
    border-radius: 4px;
    opacity: 0.85;
  }
  .cascade-card::after {
    /* badge at bottom */
    content: "";
    position: absolute;
    bottom: 8px; left: 50%;
    transform: translateX(-50%);
    width: 32px; height: 8px;
    background: var(--cascade-color);
    border-radius: 4px;
    opacity: 0.7;
  }

  @keyframes cascade-fall {
    0%   { transform: translateY(0)      scale(var(--cascade-scale)); opacity: 0; }
    8%   { opacity: 0.14; }
    92%  { opacity: 0.14; }
    100% { transform: translateY(118vh)  scale(var(--cascade-scale)); opacity: 0; }
  }

  /* Output icon flow — emoji items shoot outward from core through the
     6 gaps between cards (where connectors were). Starts after the
     end-of-Inside ripple (~7.5s). */
  .output-icons {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  /* .output-icon-wrap handles direction (rotate + translate). The inner
     .output-icon counter-rotates so the emoji glyph stays upright. */
  .output-icon-wrap {
    position: absolute;
    left: 50%; top: 50%;
    opacity: 0;
    pointer-events: none;
    line-height: 1;
  }
  .output-icon {
    display: inline-block;
    font-size: var(--icon-size, 26px);
    line-height: 1;
    text-shadow: 0 0 10px rgba(0, 0, 0, 0.45);
    transform: rotate(calc(-1 * var(--angle, 0deg)));
  }
  body.stage-inside .output-icon-wrap {
    animation: output-flow-out var(--out-duration, 5s) linear infinite;
    animation-delay: var(--out-delay, 7.5s);
  }
  @keyframes output-flow-out {
    0%   { transform: rotate(var(--angle)) translateY(-9vmin);  opacity: 0; }
    12%  { opacity: 1; }
    82%  { opacity: 1; }
    100% { transform: rotate(var(--angle)) translateY(-90vmax); opacity: 0; }
  }

  /* ============================================================
     STAGE: LAUNCH — inherits Inside's full end state (schematic with
     agent cards, MCP cycle, EQ bars, blue core + connectors, data
     lines + particles, LLM core cycle, cascade).
     Phase 1 (0–1.2s): 3 stage rings explode outward (singularity-style);
                       background cascade fades out.
     Phase 2 (1.5–3s): 6 agent cards rotate clockwise + shrink to nothing.
                       Data lines, particles, LLM core cycle fade out.
     Phase 3 (2.5s+): Connectors + core revert from Sapphire to default
                      monochrome. 6 NICE orbit dots reappear.
     End state: original NICE brand mark.
     ============================================================ */

  /* Phase 1: rings explode outward (singularity-style) */
  .mark-wrap[data-stage="launch"] .stage-ring-1 {
    animation: launch-ring-explode 1.2s 0s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
  }
  .mark-wrap[data-stage="launch"] .stage-ring-2 {
    animation: launch-ring-explode 1.2s 0.2s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
  }
  .mark-wrap[data-stage="launch"] .stage-ring-3 {
    animation: launch-ring-explode 1.2s 0.4s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
  }
  @keyframes launch-ring-explode {
    0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0.9; }
    100% { transform: translate(-50%, -50%) scale(3.2); opacity: 0; }
  }

  /* (Cascade fade-out removed — cascade is already gone from Inside's
     end-ripple, and Launch's visibility selector no longer matches.) */

  /* Phase 2: data lines, particles, and core-LLM cycle fade out (1.6s) */
  .mark-wrap[data-stage="launch"] .inside-lines,
  .mark-wrap[data-stage="launch"] .inside-particles,
  .mark-wrap[data-stage="launch"] .core-llm-cycle {
    animation: launch-fade-out 0.7s 1.6s ease-out forwards;
  }
  @keyframes launch-fade-out {
    to { opacity: 0; }
  }

  /* Phase 2: 6 agent cards rotate clockwise + shrink to scale 0 (1.5–3s) */
  .mark-wrap[data-stage="launch"] .agent-cards {
    transform-origin: 2500px 2500px;
    animation: launch-cards-spiral 1.5s 1.5s cubic-bezier(0.5, 0, 0.7, 1) forwards;
  }
  @keyframes launch-cards-spiral {
    0%   { transform: rotate(0deg)    scale(1);    opacity: 1; }
    75%  { transform: rotate(330deg)  scale(0.32); opacity: 1; }
    100% { transform: rotate(360deg)  scale(0);    opacity: 0; }
  }

  /* Phase 3: connectors + core ring revert from Sapphire to default (2.5s) */
  .mark-wrap[data-stage="launch"] .mark-core path:nth-child(1),
  .mark-wrap[data-stage="launch"] .mark-pillars path,
  .mark-wrap[data-stage="launch"] .mark-chevrons path,
  .mark-wrap[data-stage="launch"] .mark-chevrons polygon {
    animation:
      inside-blue-shift 0.7s 1.1s ease-out forwards,
      launch-revert-default 0.7s 2.5s ease-out forwards;
  }
  @keyframes launch-revert-default {
    to { fill: var(--ink); }
  }

  /* Phase 3: 6 NICE orbit dots reappear at their original positions (2.8s) */
  .mark-wrap[data-stage="launch"] .mark-orbit path:nth-child(n) {
    animation: launch-dots-reappear 0.8s 2.8s ease-out forwards;
  }
  @keyframes launch-dots-reappear {
    0%   { fill: var(--accent); opacity: 0; transform: scale(0); }
    60%  { fill: var(--accent); opacity: 1; transform: scale(1.12); }
    100% { fill: var(--ink);    opacity: 1; transform: scale(1); }
  }

  @media (prefers-reduced-motion: reduce) {
    .mark-wrap > *, .mark-wrap [class*="mark-"], .particle { animation: none !important; }
  }
</style>

              <path fill="#0866FF" d="M6.915 4.03c-1.968 0-3.683 1.28-4.871 3.113C.704 9.208 0 11.883 0 14.449c0 .706.07 1.369.21 1.973a6.624 6.624 0 0 0 .265.86 5.297 5.297 0 0 0 .371.761c.696 1.159 1.818 1.927 3.593 1.927 1.497 0 2.633-.671 3.965-2.444.76-1.012 1.144-1.626 2.663-4.32l.756-1.339.186-.325c.061.1.121.196.183.3l2.152 3.595c.724 1.21 1.665 2.556 2.47 3.314 1.046.987 1.992 1.22 3.06 1.22 1.075 0 1.876-.355 2.455-.843a3.743 3.743 0 0 0 .81-.973c.542-.939.861-2.127.861-3.745 0-2.72-.681-5.357-2.084-7.45-1.282-1.912-2.957-2.93-4.716-2.93-1.047 0-2.088.467-3.053 1.308-.652.57-1.257 1.29-1.82 2.05-.69-.875-1.335-1.547-1.958-2.056-1.182-.966-2.315-1.303-3.454-1.303zm10.16 2.053c1.147 0 2.188.758 2.992 1.999 1.132 1.748 1.647 4.195 1.647 6.4 0 1.548-.368 2.9-1.839 2.9-.58 0-1.027-.23-1.664-1.004-.496-.601-1.343-1.878-2.832-4.358l-.617-1.028a44.908 44.908 0 0 0-1.255-1.98c.07-.109.141-.224.211-.327 1.12-1.667 2.118-2.602 3.358-2.602zm-10.201.553c1.265 0 2.058.791 2.675 1.446.307.327.737.871 1.234 1.579l-1.02 1.566c-.757 1.163-1.882 3.017-2.837 4.338-1.191 1.649-1.81 1.817-2.486 1.817-.524 0-1.038-.237-1.383-.794-.263-.426-.464-1.13-.464-2.046 0-2.221.63-4.535 1.66-6.088.454-.687.964-1.226 1.533-1.533a2.264 2.264 0 0 1 1.088-.285z"/>
            </svg>
          </g>
          <!-- 6. Gemini -->
          <g class="core-llm" transform="translate(2500, 2500)">
            <svg x="-180" y="-180" width="360" height="360" viewBox="0 0 24 24">
              <path fill="url(#gemini-grad)" d="M12 2c-1 5-4 8-10 9 6 1 9 4 10 11 1-7 4-10 10-11-6-1-9-4-10-9z"/>
            </svg>
          </g>
        </g>
      </svg>
    </div>
  </div>

  <button class="replay" type="button" id="replay">
    Replay
  </button>
  <button class="theme-toggle" type="button" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>

<script>
  const wrap = document.querySelector('.mark-wrap');
  const animLabel = document.getElementById('anim-label');
  const stageLabel = document.getElementById('stage-label');
  const replay = document.getElementById('replay');
  const animButtons = [...document.querySelectorAll('.picker:not(.picker-stage) button')];
  const stageButtons = [...document.querySelectorAll('.picker-stage button')];

  // Shower particles — 180 colored dots streaming in for the Inside stage.
  // Sapphire (--accent) is intentionally NOT in this palette — it's reserved
  // for "data within NICE" (Mission spokes + Launch trails).
  const SHOWER_PALETTE = [
    '#ff5e7e', // coral
    '#ffa724', // amber
    '#f7d100', // yellow
    '#2ed573', // green
    '#00d9ff', // cyan
    '#8c52ff', // purple
    '#ff3eb5', // magenta
    '#7afbff', // ice
    '#ffce5c', // gold
    '#a0ff5c', // lime
  ];
  // Delay range = longest stage cycle (Platform 6s) so particles spread
  // uniformly across the full cycle on both Mission and Platform. Negative
  // values jump each particle mid-cycle at page load — no warm-up gap.
  const SHOWER_DELAY_RANGE = 6;
  const SHOWER_COUNT = 180;
  (function generateShower() {
    const shower = document.querySelector('.particles-shower');
    if (!shower) return;
    const frag = document.createDocumentFragment();
    for (let i = 0; i < SHOWER_COUNT; i++) {
      const p = document.createElement('span');
      p.className = 'particle';
      const angle = Math.random() * 360;
      const delay = -Math.random() * SHOWER_DELAY_RANGE;
      const color = SHOWER_PALETTE[i % SHOWER_PALETTE.length];
      p.style.setProperty('--angle', angle + 'deg');
      p.style.setProperty('--delay', delay + 's');
      p.style.background = color;
      p.style.boxShadow = '0 0 8px ' + color;
      frag.appendChild(p);
    }
    shower.appendChild(frag);
  })();

  // Inside-stage card cascade — many small rarity-colored cards raining
  // down the background. Random horizontal position, size, color, speed.
  const CASCADE_PALETTE = [
    '#FF3EB5', '#FBBF24', '#C084FC', '#60A5FA', '#9CA3AF',
    '#FF5E7E', '#2ED573', '#00D9FF', '#FFCE5C', '#A0FF5C',
    '#8C52FF', '#F7D100', '#7AFBFF', '#FF5C8A',
  ];
  const CASCADE_COUNT = 70;
  (function generateCascade() {
    const cascade = document.querySelector('.card-cascade');
    if (!cascade) return;
    const frag = document.createDocumentFragment();
    for (let i = 0; i < CASCADE_COUNT; i++) {
      const card = document.createElement('div');
      card.className = 'cascade-card';
      const color = CASCADE_PALETTE[Math.floor(Math.random() * CASCADE_PALETTE.length)];
      const left = Math.random() * 100;
      const duration = 11 + Math.random() * 10;
      const delay = -Math.random() * duration;
      const scale = 0.55 + Math.random() * 0.7;
      card.style.setProperty('--cascade-color', color);
      card.style.setProperty('--cascade-duration', duration + 's');
      card.style.setProperty('--cascade-delay', delay + 's');
      card.style.setProperty('--cascade-scale', scale);
      card.style.left = left + '%';
      frag.appendChild(card);
    }
    cascade.appendChild(frag);
  })();

  // Output icon flow — emoji items shooting out from the core through the
  // 6 gaps between agent cards (at angles 0/60/120/180/240/300°).
  const OUTPUT_ICONS = [
    // Communication / messaging
    '📧','📨','✉️','💌','📤','📥','📬','📭','📮','📞','📲','💬','💭','📢','📣','🔔','🐦','🗨️',
    // Documents
    '📄','📑','📋','📝','📜','📃','📒','📓','📕','📗','📘','📙','📚','🗂️','📁','📂','🗃️','🗄️','🧾',
    // Charts / data / code
    '📊','📈','📉','💾','🔗','🧮','📐','📏','#️⃣',
    // Media — image / video / audio
    '🎞️','🎬','🎥','📷','📸','🖼️','📺','📻','🎵','🎶','🎼','🎤','🎧','🎙️','🔊','🎨','🖌️','🖍️',
    // Tech devices
    '💻','🖥️','📱','⌚','💽','💿','📀','🖨️','🖱️','🎮','🕹️',
    // Marketing / business / commerce
    '📰','🗞️','🏷️','💼','💰','💵','💳','💎','🛒','🧰','🎟️','🎫','📦','🎁','🏆','🥇','🎖️','🏅','🎯','📌','📍',
    // Energy / ideas / brand flair
    '⭐','🌟','✨','💡','🚀','⚡','🔥','🌐','📡','🌍','⚙️','🔧','🔍','🔐','❤️','🎉','🎊','👍',
  ];
  // Gaps between agent cards (in CSS rotate scheme: 0°=up, clockwise).
  // Cards sit at 0/60/120/180/240/300; gaps are at the midpoints.
  const OUTPUT_BASE_ANGLES = [30, 90, 150, 210, 270, 330];
  const OUTPUT_COUNT = 60;
  const OUTPUT_DELAY_START = 7.5; // matches inside-cascade-ripple end + buffer
  (function generateOutputs() {
    const outputs = document.querySelector('.output-icons');
    if (!outputs) return;
    const frag = document.createDocumentFragment();
    for (let i = 0; i < OUTPUT_COUNT; i++) {
      const wrap = document.createElement('span');
      wrap.className = 'output-icon-wrap';
      const icon = document.createElement('span');
      icon.className = 'output-icon';
      icon.textContent = OUTPUT_ICONS[Math.floor(Math.random() * OUTPUT_ICONS.length)];
      wrap.appendChild(icon);
      const baseAngle = OUTPUT_BASE_ANGLES[i % OUTPUT_BASE_ANGLES.length];
      const angleJitter = (Math.random() - 0.5) * 36; // ±18° spread per direction
      const angle = baseAngle + angleJitter;
      const duration = 4 + Math.random() * 4;            // 4–8s travel
      const delay = OUTPUT_DELAY_START + Math.random() * 5; // 7.5–12.5s staggered start
      const size = 16 + Math.random() * 44;              // 16–60px wider range
      wrap.style.setProperty('--angle', angle + 'deg');
      wrap.style.setProperty('--out-duration', duration + 's');
      wrap.style.setProperty('--out-delay', delay + 's');
      wrap.style.setProperty('--icon-size', size + 'px');
      frag.appendChild(wrap);
    }
    outputs.appendChild(frag);
  })();

  // Agent-card enhancements: cycle white MCP logos inside the art area,
  // and replace the 2 placeholder lines with animated equalizer bars.
  const MCP_LOGO_URLS = [
    'https://cdn.simpleicons.org/github/ffffff',
    'https://cdn.simpleicons.org/hubspot/ffffff',
    'https://cdn.simpleicons.org/stripe/ffffff',
    'https://cdn.simpleicons.org/atlassian/ffffff',
    'https://cdn.simpleicons.org/linear/ffffff',
    'https://cdn.simpleicons.org/notion/ffffff',
    'https://cdn.simpleicons.org/sentry/ffffff',
    'https://cdn.simpleicons.org/zapier/ffffff',
    'https://cdn.simpleicons.org/figma/ffffff',
    'https://cdn.simpleicons.org/cloudflare/ffffff',
    'https://cdn.simpleicons.org/airtable/ffffff',
    'https://cdn.simpleicons.org/miro/ffffff',
    'https://cdn.simpleicons.org/vercel/ffffff',
    'https://cdn.simpleicons.org/asana/ffffff',
    'https://cdn.simpleicons.org/replicate/ffffff',
    'https://cdn.simpleicons.org/gmail/ffffff',
    'https://cdn.simpleicons.org/googledrive/ffffff',
    'https://cdn.simpleicons.org/googlecalendar/ffffff',
    'https://cdn.simpleicons.org/pagerduty/ffffff',
    'https://cdn.simpleicons.org/intercom/ffffff',
  ];
  const STEP_DURATION = 3; // seconds per MCP logo
  const SVG_NS = 'http://www.w3.org/2000/svg';

  // Pre-warm the browser image cache for every MCP URL so the SVG <image>
  // elements never show the broken-placeholder while a fetch is in flight.
  MCP_LOGO_URLS.forEach(url => { const i = new Image(); i.src = url; });

  (function enhanceAgentCards() {
    const cards = document.querySelectorAll('.agent-card');
    if (!cards.length) return;
    cards.forEach((card, cardIdx) => {
      // Keep the placeholder circle + lines (they're the generic look
      // shown on How and other stages). MCP cycle + EQ bars are added
      // on top and only activate on Inside via stage-scoped CSS.

      // Insert all MCP logos in this card. Round-robin offset by
      // cardIdx ensures the 6 cards never show the same MCP simultaneously.
      const mcpGroup = document.createElementNS(SVG_NS, 'g');
      mcpGroup.setAttribute('class', 'card-mcp-cycle');
      const N = MCP_LOGO_URLS.length;
      for (let p = 0; p < N; p++) {
        const href = MCP_LOGO_URLS[(p + cardIdx) % N];
        const img = document.createElementNS(SVG_NS, 'image');
        img.setAttribute('class', 'card-mcp');
        img.setAttribute('href', href);
        img.setAttribute('x', '-50');
        img.setAttribute('y', '-155');
        img.setAttribute('width', '100');
        img.setAttribute('height', '100');
        img.style.setProperty('--mcp-cycle-delay', (p * STEP_DURATION) + 's');
        mcpGroup.appendChild(img);
      }
      // Insert mcp group before the AGENT text (so logos render below text)
      const agentText = card.querySelector('text');
      card.insertBefore(mcpGroup, agentText);

      // Keep the 2 placeholder lines (visible on non-Inside stages).
      // Add equalizer bars on top — they're hidden by default and only
      // visible/animated on Inside via stage-scoped CSS.
      const eqGroup = document.createElementNS(SVG_NS, 'g');
      eqGroup.setAttribute('class', 'card-eq');
      const BAR_COUNT = 14;
      const BAR_WIDTH = 12;
      const BAR_SPACING = 4;
      const BAR_AREA_WIDTH = BAR_COUNT * BAR_WIDTH + (BAR_COUNT - 1) * BAR_SPACING;
      const startX = -BAR_AREA_WIDTH / 2;
      for (let i = 0; i < BAR_COUNT; i++) {
        const bar = document.createElementNS(SVG_NS, 'rect');
        bar.setAttribute('class', 'eq-bar');
        bar.setAttribute('x', String(startX + i * (BAR_WIDTH + BAR_SPACING)));
        bar.setAttribute('y', '70');
        bar.setAttribute('width', String(BAR_WIDTH));
        bar.setAttribute('height', '30');
        bar.setAttribute('rx', '2');
        bar.style.setProperty('--eq-delay', (Math.random() * 0.95).toFixed(2) + 's');
        eqGroup.appendChild(bar);
      }
      // Insert before badge
      const badge = card.querySelector('.card-badge');
      card.insertBefore(eqGroup, badge);
    });
  })();

  const ANIM_LABELS = {
    boot: '1 — Boot-up sequence',
    schematic: '2 — Schematic draw-in',
    singularity: '3 — Singularity → big bang',
    constellation: '4 — Constellation reveal',
    magnetic: '5 — Magnetic assembly',
    warp: '6 — Warp arrival',
  };
  const STAGE_LABELS = {
    intro:    'Intro — brand mark (no continuous loop)',
    mission:  'Mission — colorful data shower flowing into core',
    platform: 'Platform — LLMs collapse into core, 12 MCPs emerge',
    how:      'How — 12 MCPs spin + collapse, NICE icon reveals',
    inside:   'Inside — nodes drift + blue spokes dispatch from core',
    launch:   'Launch — spin + outward particle trails',
  };

  function playAnim(name) {
    // Force reflow by removing then re-adding so the animation restarts.
    wrap.removeAttribute('data-anim');
    void wrap.offsetWidth;
    wrap.setAttribute('data-anim', name);
    animButtons.forEach(b => b.classList.toggle('is-active', b.dataset.anim === name));
    animLabel.textContent = 'Anim: ' + (ANIM_LABELS[name] || name);
  }

  function setStage(name) {
    wrap.setAttribute('data-stage', name);
    // Also stamp the body so non-mark-wrap elements (like the cascade) can
    // toggle visibility per stage.
    const allStages = ['intro','mission','platform','how','inside','launch'];
    allStages.forEach(s => document.body.classList.remove('stage-' + s));
    document.body.classList.add('stage-' + name);
    stageButtons.forEach(b => b.classList.toggle('is-active', b.dataset.stage === name));
    stageLabel.textContent = 'Stage: ' + (STAGE_LABELS[name] || name);
  }

  animButtons.forEach(b => b.addEventListener('click', () => playAnim(b.dataset.anim)));
  stageButtons.forEach(b => b.addEventListener('click', () => setStage(b.dataset.stage)));
  replay.addEventListener('click', () => {
    const current = wrap.getAttribute('data-anim') || 'constellation';
    playAnim(current);
  });

  // Dark mode toggle
  const themeToggle = document.getElementById('theme-toggle');
  function setTheme(name) {
    if (name === 'dark') document.body.setAttribute('data-theme', 'dark');
    else document.body.removeAttribute('data-theme');
    themeToggle.textContent = name === 'dark' ? '☀️' : '🌙';
  }
  themeToggle.addEventListener('click', () => {
    setTheme(document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  // Keyboard: 1-6 → anim, Q/W/E/R/T/Y → stage, Space/R → replay.
  const STAGE_KEYS = ['q','w','e','r','t','y'];
  document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    const idx = parseInt(e.key, 10);
    const stageIdx = STAGE_KEYS.indexOf(key);
    if (idx >= 1 && idx <= 6) {
      playAnim(animButtons[idx - 1].dataset.anim);
    } else if (stageIdx >= 0) {
      setStage(stageButtons[stageIdx].dataset.stage);
    } else if (key === ' ' || (key === 'r' && e.shiftKey)) {
      e.preventDefault();
      replay.click();
    }
  });
</script>
</body>
</html>
